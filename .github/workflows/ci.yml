name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile nvoip/*.py examples/*.py
      - run: python -m pip install build
      - run: python -m build
